name: HOSHIYOMI X auto post

on:
  schedule:
    # UTC. Runs at 00:00 / 08:00 / 12:30 / 22:00 JST.
    - cron: "0 15 * * *"
    - cron: "0 23 * * *"
    - cron: "30 3 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 means generate text only without posting"
        default: "1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: https://hoshiyomi4u.com/m
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python generate_and_post.py
